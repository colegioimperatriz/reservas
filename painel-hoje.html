<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel de Reservas — Hoje</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:var(--bg);
color:var(--text);
padding:30px;
}

/* HEADER */

header{
text-align:center;
margin-bottom:40px;
}

header h1{
margin:0;
font-size:42px;
letter-spacing:1px;
}

header p{
margin-top:8px;
color:var(--muted);
font-size:18px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:22px;
max-width:1600px;
margin:auto;
}

/* CARD HORARIO */

.slot{
background:var(--card);
border-radius:16px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:.2s;
}

.slot:hover{
transform:translateY(-3px);
}

.time{
font-size:28px;
font-weight:700;
margin-bottom:14px;
}

/* EVENTOS */

.event{
padding:10px;
border-radius:8px;
font-size:15px;
margin-bottom:8px;
color:#fff;
}

.prof{
font-size:13px;
opacity:.9;
}

/* cores ambientes */

.Chromebooks{background:#1e88e5}
.Cozinha{background:#f39c12}
.TeleSala{background:#2e7d32}
.SalaDeAtendimentoI{background:#8e44ad}
.SalaDeReunioes{background:#d35400}
.Carro{background:#6c757d}
.LabQuimica{background:#00796b}
.LabFisica{background:#5d4037}
.LabBiologia{background:#c2185b}
.SalaDoCTC{background:#3949ab}

.livre{
background:#16a34a;
text-align:center;
font-weight:600;
}

/* relógio */

.clock{
position:fixed;
top:20px;
right:30px;
font-size:18px;
color:var(--muted);
}

</style>
</head>

<body>

<div class="clock" id="clock"></div>

<header>
<h1>Reservas de Hoje</h1>
<p id="dataHoje"></p>
</header>

<div id="grid" class="grid"></div>

<script>

const SUPABASE_URL="https://oufiieqxyyqnqpcbuyms.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91ZmlpZXF4eXlxbnFwY2J1eW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkzNDMwNDgsImV4cCI6MjA3NDkxOTA0OH0.-4QPA1R5y24daAt-WsZuWc8-2bJxCJGhdTR1nq4RnHc";

const headers={
"apikey":SUPABASE_KEY,
"Authorization":`Bearer ${SUPABASE_KEY}`
};

let reservas=[];

function atualizarRelogio(){

const agora=new Date();

document.getElementById("clock").textContent=
agora.toLocaleTimeString("pt-BR");

}

setInterval(atualizarRelogio,1000);

function normalizarClasse(txt){
return txt
.replace(/\s+/g,'')
.replace(/[^\w]/g,'');
}

function toArray(val){

if(!val) return [];

if(Array.isArray(val)) return val;

try{
return JSON.parse(val);
}
catch{
return val.split(",").map(s=>s.trim());
}

}

function horarioPassou(horario){

const agora=new Date();

const [h,m]=horario.split(":").map(Number);

const horarioMin=h*60+m;
const agoraMin=agora.getHours()*60+agora.getMinutes();

return horarioMin<agoraMin;

}

async function carregar(){

const hoje=new Date().toISOString().split("T")[0];

const r=await fetch(
`${SUPABASE_URL}/rest/v1/reservas?select=*`,
{headers}
);

reservas=await r.json();

renderizar(hoje);

}

function renderizar(hoje){

const grid=document.getElementById("grid");

grid.innerHTML="";

let eventos=[];

reservas
.filter(r=> (r.datafim||"").startsWith(hoje))
.forEach(r=>{

const horas=toArray(r.horarios);

horas.forEach(h=>{

if(!horarioPassou(h)){

eventos.push({
horario:h,
ambiente:r.ambiente,
prof:r.professor||"—",
quant:r.quantidade||1
});

}

});

});

eventos.sort((a,b)=>{

const [h1,m1]=a.horario.split(":").map(Number);
const [h2,m2]=b.horario.split(":").map(Number);

return (h1*60+m1)-(h2*60+m2);

});

let grupos={};

eventos.forEach(ev=>{

if(!grupos[ev.horario]) grupos[ev.horario]=[];

grupos[ev.horario].push(ev);

});

Object.keys(grupos).forEach(h=>{

const slot=document.createElement("div");
slot.className="slot";

const time=document.createElement("div");
time.className="time";
time.textContent="🕗 "+h;

slot.appendChild(time);

grupos[h].forEach(ev=>{

const e=document.createElement("div");

e.className="event "+normalizarClasse(ev.ambiente);

e.innerHTML=`
<strong>${ev.ambiente} (${ev.quant})</strong>
<div class="prof">👤 ${ev.prof}</div>
`;

slot.appendChild(e);

});

grid.appendChild(slot);

});

}

function mostrarData(){

const hoje=new Date();

document.getElementById("dataHoje").textContent=
hoje.toLocaleDateString("pt-BR",{
weekday:"long",
day:"numeric",
month:"long"
});

}

mostrarData();

carregar();

setInterval(carregar,60000);

</script>

</body>
</html>
