<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Desenvolvido e mantido por Cássio Winkler - 2026 - cassio.tec.br -->
<title>Painel de Reservas - Hoje</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --highlight:#22c55e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:var(--bg);
  color:var(--text);
  padding:30px;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  flex-wrap:wrap;
}

h1{margin:0;font-size:38px;}
.data{color:var(--muted);font-size:18px;}
.clock{font-size:28px;font-weight:700;}
.stats{margin-top:10px;font-size:16px;color:var(--muted);}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

/* SLOT */
.slot{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
  transition:.2s;
  position:relative;
}

.slot.proximo{border:3px solid var(--highlight);}
.slot.alerta{animation:alerta 1s infinite;}

@keyframes alerta{
  0%{box-shadow:0 0 10px red}
  50%{box-shadow:0 0 25px red}
  100%{box-shadow:0 0 10px red}
}

.time{font-size:32px;font-weight:700;margin-bottom:12px;}
.event{padding:10px;border-radius:8px;margin-bottom:8px;color:#fff;font-size:18px;}
.prof{font-size:15px;opacity:.9;}

/* PROGRESSO */
.progressBar{
  position:fixed;
  bottom:0;
  left:0;
  height:6px;
  background:#22c55e;
  transition:width 0.5s ease;
}

/* cores */
.Chromebooks{background:#1e88e5}
.Cozinha{background:#f39c12}
.TeleSala{background:#2e7d32}
.SalaDeAtendimentoI{background:#8e44ad}
.SalaDeReunioes{background:#d35400}
.Carro{background:#6c757d}
.LabQuimica{background:#00796b}
.LabFisica{background:#5d4037}
.LabBiologia{background:#c2185b}
.SalaDoCTC{background:#3949ab}

/* MEDIA QUERIES TVs grandes */
@media(min-width:1920px){
  .time{font-size:48px;}
  .event{font-size:22px;}
  .slot{padding:30px;}
}
</style>
</head>

<body>

<header>
  <div>
    <h1>Reservas de Hoje</h1>
    <div id="data" class="data"></div>
    <div id="stats" class="stats"></div>
  </div>
  <div id="clock" class="clock"></div>
</header>

<div id="grid" class="grid"></div>
<div id="progress" class="progressBar"></div>

<script>
const SUPABASE_URL="https://oufiieqxyyqnqpcbuyms.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91ZmlpZXF4eXlxbnFwY2J1eW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkzNDMwNDgsImV4cCI6MjA3NDkxOTA0OH0.-4QPA1R5y24daAt-WsZuWc8-2bJxCJGhdTR1nq4RnHc";
const headers={apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`};

let reservas=[];

function normalizarClasse(txt){return txt.replace(/\s+/g,'').replace(/[^\w]/g,'');}
function toArray(v){if(!v)return[]; if(Array.isArray(v)) return v; try{return JSON.parse(v)}catch{return v.split(",").map(s=>s.trim())}}
function minutos(h){const [a,b]=h.split(":").map(Number); return a*60+b;}
function agoraMin(){const d=new Date();return d.getHours()*60+d.getMinutes();}
function horarioPassou(h){
  return minutos(h) + 20 < agoraMin();
}

/* Relógio */
function atualizarRelogio(){
  const agora=new Date();
  document.getElementById("clock").textContent=agora.toLocaleTimeString("pt-BR");
}
setInterval(atualizarRelogio,1000);

/* Data */
document.getElementById("data").textContent=new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});

/* Barra de progresso */
function progressoDia(){
  const agora=new Date();
  const minutosAgora=agora.getHours()*60+agora.getMinutes();
  const perc=(minutosAgora/1440)*100;
  document.getElementById("progress").style.width=perc+"%";
}
progressoDia();
setInterval(progressoDia,60000);

/* Carregar dados */
async function carregar(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/reservas?select=*`,{headers});
  reservas=await r.json();
  renderizar();
}

/* Renderização otimizada */
function renderizar(){
  const hoje=new Date().toISOString().split("T")[0];
  let eventos=[];
  reservas.filter(r=>(r.datafim||"").startsWith(hoje)).forEach(r=>{
    const horas=toArray(r.horarios);
    horas.forEach(h=>{
      if(!horarioPassou(h)){
        eventos.push({horario:h,ambiente:r.ambiente,prof:r.professor||"—",quant:r.quantidade||1});
      }
    });
  });

  eventos.sort((a,b)=>minutos(a.horario)-minutos(b.horario));
  document.getElementById("stats").textContent=`${eventos.length} reservas restantes hoje`;

  const grupos={};
  eventos.forEach(ev=>{if(!grupos[ev.horario]) grupos[ev.horario]=[]; grupos[ev.horario].push(ev);});

  const grid=document.getElementById("grid");
  grid.innerHTML="";
  const fragment=document.createDocumentFragment();
  const agora=agoraMin();

  Object.keys(grupos).forEach((h,i)=>{
    const slot=document.createElement("div");
    slot.className="slot";
    const diff=minutos(h)-agora;
    if(i===0) slot.classList.add("proximo");
    if(diff<=10 && diff>=0) slot.classList.add("alerta");

    const time=document.createElement("div");
    time.className="time";
    time.textContent="🕒 "+h;
    slot.appendChild(time);

    grupos[h].forEach(ev=>{
      const e=document.createElement("div");
      e.className="event "+normalizarClasse(ev.ambiente);
      e.innerHTML=`<strong>${ev.ambiente} (${ev.quant})</strong><div class="prof">👤 ${ev.prof}</div>`;
      slot.appendChild(e);
    });

    fragment.appendChild(slot);
  });

  grid.appendChild(fragment);
}

/* Iniciar */
carregar();

/* F5 automático a cada 90 minutos */
setInterval(()=>{location.reload();},5400000);

</script>
</body>
</html>
